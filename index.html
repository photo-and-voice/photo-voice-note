<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo & Voice — 写真とおしゃべりノート</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --transition-swim: 0.7s cubic-bezier(0.23, 1, 0.32, 1);
    --transition-theme: 0.5s ease;
  }

  [data-theme="dark"] {
    --bg: #0a0a0a;
    --bg-card: #141414;
    --text: #e8e4df;
    --text-dim: #8a8580;
    --text-voice: #c4bfb8;
    --text-exif: #6a6560;
    --accent: #d4a574;
    --accent-dim: rgba(212,165,116,0.15);
    --accent-ai: #7ba6b3;
    --accent-ai-dim: rgba(123,166,179,0.15);
    --border: rgba(255,255,255,0.06);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-card-hover: 0 12px 40px rgba(0,0,0,0.5);
    --overlay-bg: rgba(0,0,0,0.92);
    --overlay-blur: blur(0px);
    --overlay-img-shadow: none;
    --grain-opacity: 0;
    --filter-btn-bg: transparent;
  }

  [data-theme="light"] {
    --bg: #f4f2ee;
    --bg-card: #ffffff;
    --text: #2a2825;
    --text-dim: #9a958e;
    --text-voice: #4a4640;
    --text-exif: #b0aaa3;
    --accent: #b07a45;
    --accent-dim: rgba(176,122,69,0.1);
    --accent-ai: #4a8a9a;
    --accent-ai-dim: rgba(74,138,154,0.08);
    --border: rgba(0,0,0,0.06);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
    --shadow-card-hover: 0 4px 16px rgba(0,0,0,0.07), 0 8px 30px rgba(0,0,0,0.04);
    --overlay-bg: rgba(244,242,238,0.96);
    --overlay-blur: blur(8px);
    --overlay-img-shadow: 0 8px 40px rgba(0,0,0,0.1);
    --grain-opacity: 0.015;
    --filter-btn-bg: var(--bg-card);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 300;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    transition: background var(--transition-theme), color var(--transition-theme);
  }

  body::before {
    content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: var(--grain-opacity); transition: opacity var(--transition-theme);
  }

  .header {
    position: relative; z-index: 1; padding: 3rem 2rem 1rem;
    max-width: 1200px; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2.4rem; letter-spacing: 0.08em; color: var(--text); margin-bottom: 0.3rem; transition: color var(--transition-theme); }
  .header h1 span { color: var(--accent); transition: color var(--transition-theme); }
  .header .subtitle { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.15em; margin-bottom: 0.5rem; transition: color var(--transition-theme); }
  .header .count { font-size: 0.75rem; color: var(--text-dim); font-family: 'Cormorant Garamond', serif; font-style: italic; transition: color var(--transition-theme); }

  .controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 0.5rem; }
  .control-group { display: flex; gap: 0.3rem; align-items: center; }
  .control-label { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-right: 0.3rem; transition: color var(--transition-theme); }

  .ctrl-btn {
    background: transparent; border: 1px solid rgba(140,130,120,0.3);
    color: var(--text-dim); width: 32px; height: 32px; border-radius: 2px;
    cursor: pointer; transition: all 0.3s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--text); }
  .ctrl-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .ctrl-btn svg { width: 14px; height: 14px; fill: currentColor; }
  .controls-divider { width: 1px; height: 20px; background: var(--border); transition: background var(--transition-theme); }

  .filter-bar {
    position: relative; z-index: 1; padding: 0.5rem 2rem 0.5rem;
    max-width: 1200px; margin: 0 auto;
    display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
  }
  .filter-label { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; margin-right: 0.3rem; min-width: fit-content; transition: color var(--transition-theme); }
  .filter-btn {
    background: var(--filter-btn-bg); border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 400; font-size: 0.8rem; padding: 0.4rem 1rem;
    border-radius: 2px; cursor: pointer; transition: all 0.3s ease; letter-spacing: 0.05em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .filter-btn.ai-context { border-style: dashed; background: transparent; }
  .filter-btn.ai-context:hover { border-color: var(--accent-ai); color: var(--accent-ai); }
  .filter-btn.ai-context.active { background: var(--accent-ai-dim); border-color: var(--accent-ai); color: var(--accent-ai); }
  .filter-divider { width: 1px; height: 20px; background: var(--border); margin: 0 0.3rem; transition: background var(--transition-theme); }
  .filter-section-label { font-size: 0.55rem; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.6; transition: color var(--transition-theme); }

  .grid {
    position: relative; z-index: 1; max-width: 1200px; margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.2rem; transition: all 0.5s ease;
  }
  .grid.list-view { grid-template-columns: 1fr; max-width: 720px; gap: 2rem; }
  .grid.list-view .card { display: grid; grid-template-columns: 1fr; }
  .grid.list-view .card-img-wrap { padding-bottom: 56%; }
  .grid.list-view .card-body { padding: 1.2rem 1.5rem 1rem; }
  .grid.list-view .card-voice { font-size: 1rem; line-height: 1.9; }
  .grid.list-view .card-id-row { font-size: 1rem; }

  .card {
    position: relative; border-radius: 3px; overflow: hidden; cursor: pointer;
    background: var(--bg-card); box-shadow: var(--shadow-card);
    transition: transform var(--transition-swim), opacity 0.5s ease, box-shadow 0.4s ease, background var(--transition-theme);
  }
  .card.hidden { display: none !important; }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-card-hover); }

  .card-img-wrap { position: relative; width: 100%; padding-bottom: 66%; overflow: hidden; }
  .card-img-wrap img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
  .card:hover .card-img-wrap img { transform: scale(1.04); }

  .card-body { padding: 1rem 1rem 0.8rem; }

  .card-id-row {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem; color: var(--text-exif);
    letter-spacing: 0.08em; margin-bottom: 0.4rem;
    display: flex; align-items: baseline; gap: 0.5rem;
    transition: color var(--transition-theme);
  }
  .card-id-row .card-id {
    font-size: 0.6rem; color: var(--accent);
    letter-spacing: 0.15em;
  }
  .card-date {
    color: var(--text-exif); letter-spacing: 0.05em;
    transition: color var(--transition-theme);
  }

  .card-voice { font-size: 0.85rem; line-height: 1.7; color: var(--text-voice); margin-bottom: 0.6rem; transition: color var(--transition-theme); }

  .card-exif {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.65rem; color: var(--text-exif);
    margin-bottom: 0.5rem; letter-spacing: 0.03em;
    transition: color var(--transition-theme);
  }

  .card-meta {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--border); padding-top: 0.5rem;
    flex-wrap: wrap; gap: 0.3rem; transition: border-color var(--transition-theme);
  }
  .card-place { font-size: 0.72rem; color: var(--text-dim); transition: color var(--transition-theme); }
  .card-contexts { display: flex; gap: 0.3rem; flex-wrap: wrap; }
  .card-context-tag { font-size: 0.58rem; color: var(--accent); background: var(--accent-dim); padding: 0.15rem 0.45rem; border-radius: 1px; letter-spacing: 0.05em; transition: all var(--transition-theme); }
  .card-context-tag.ai { color: var(--accent-ai); background: var(--accent-ai-dim); }

  .overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--overlay-bg); backdrop-filter: var(--overlay-blur); -webkit-backdrop-filter: var(--overlay-blur);
    z-index: 100; justify-content: center; align-items: center; padding: 2rem;
    cursor: pointer; animation: fadeIn 0.3s ease; transition: background var(--transition-theme);
  }
  .overlay.active { display: flex; }
  .overlay-content { max-width: 900px; width: 100%; cursor: default; animation: slideUp 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
  .overlay-content img { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 3px; margin-bottom: 1.2rem; box-shadow: var(--overlay-img-shadow); transition: box-shadow var(--transition-theme); }

  .overlay-id-row {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; color: var(--text-dim);
    letter-spacing: 0.08em; margin-bottom: 0.6rem;
    display: flex; align-items: baseline; gap: 0.6rem;
  }
  .overlay-id-row .overlay-id { font-size: 0.7rem; color: var(--accent); letter-spacing: 0.2em; }
  .overlay-date { color: var(--text-dim); letter-spacing: 0.05em; }

  .overlay-voice { font-size: 1.05rem; line-height: 1.9; color: var(--text-voice); margin-bottom: 0.8rem; max-width: 600px; }

  .overlay-exif {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.78rem; color: var(--text-dim);
    margin-bottom: 0.8rem; line-height: 1.8; letter-spacing: 0.03em;
  }
  .overlay-exif .exif-camera { color: var(--text-voice); }
  .overlay-exif .exif-detail { color: var(--text-dim); font-size: 0.72rem; }

  .overlay-meta { font-size: 0.8rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .overlay-close {
    position: fixed; top: 1.5rem; right: 2rem; font-size: 1.5rem;
    color: var(--text-dim); cursor: pointer; z-index: 101; transition: color 0.3s;
    background: none; border: none; font-family: 'Cormorant Garamond', serif;
  }
  .overlay-close:hover { color: var(--text); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    .header { padding: 2rem 1.2rem 0.8rem; flex-direction: column; align-items: flex-start; gap: 0.8rem; }
    .header h1 { font-size: 1.6rem; }
    .controls { gap: 0.6rem; }
    .filter-bar { padding: 0.5rem 1.2rem; }
    .filter-btn { font-size: 0.72rem; padding: 0.35rem 0.7rem; }
    .grid { padding: 1rem 1.2rem 3rem; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.8rem; }
    .grid.list-view { grid-template-columns: 1fr; padding: 1rem 1.2rem 3rem; }
    .card-body { padding: 0.7rem 0.7rem 0.6rem; }
    .card-voice { font-size: 0.78rem; }
    .card-exif { font-size: 0.6rem; }
    .overlay { padding: 1rem; }
    .overlay-voice { font-size: 0.92rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="subtitle">Photo & Voice</div>
    <h1>写真と<span>おしゃべり</span>ノート</h1>
    <div class="count"><span id="visible-count">0</span> fragments</div>
  </div>
  <div class="controls">
    <div class="control-group">
      <span class="control-label">View</span>
      <button class="ctrl-btn active" data-view="grid" title="グリッドビュー">
        <svg viewBox="0 0 16 16"><rect x="0" y="0" width="7" height="7"/><rect x="9" y="0" width="7" height="7"/><rect x="0" y="9" width="7" height="7"/><rect x="9" y="9" width="7" height="7"/></svg>
      </button>
      <button class="ctrl-btn" data-view="list" title="リストビュー">
        <svg viewBox="0 0 16 16"><rect x="0" y="1" width="16" height="3" rx="0.5"/><rect x="0" y="6.5" width="16" height="3" rx="0.5"/><rect x="0" y="12" width="16" height="3" rx="0.5"/></svg>
      </button>
    </div>
    <div class="controls-divider"></div>
    <div class="control-group">
      <span class="control-label">Theme</span>
      <button class="ctrl-btn active" data-theme-switch="light" title="ライト — 声を読む">
        <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="3.5"/><path d="M8 0.5v2M8 13.5v2M0.5 8h2M13.5 8h2M2.3 2.3l1.4 1.4M12.3 12.3l1.4 1.4M2.3 13.7l1.4-1.4M12.3 3.7l1.4-1.4" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </button>
      <button class="ctrl-btn" data-theme-switch="dark" title="ダーク — 写真を見る">
        <svg viewBox="0 0 16 16"><defs><mask id="m"><rect width="16" height="16" fill="white"/><circle cx="9.5" cy="6.5" r="4.5" fill="black"/></mask></defs><circle cx="8" cy="8" r="5" fill="currentColor" mask="url(#m)"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="filter-bar" id="filter-bar">
  <span class="filter-label">Context</span>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <button class="overlay-close" id="overlay-close">&times;</button>
  <div class="overlay-content" id="overlay-content"></div>
</div>

<script src="photos.js"></script>
<script>
const AI_CONTEXTS = ["体感：寒", "体感：暑", "近畿の山"];
const themeWrapper = document.documentElement;
const grid = document.getElementById('grid');
const filterBar = document.getElementById('filter-bar');
const overlay = document.getElementById('overlay');
const overlayContent = document.getElementById('overlay-content');
const overlayClose = document.getElementById('overlay-close');
const visibleCount = document.getElementById('visible-count');

function isAiContext(ctx) { return AI_CONTEXTS.includes(ctx); }

// カード用：カメラ＋レンズ
function cardExifHtml(exif) {
  if (!exif) return '';
  const parts = [exif.camera, exif.lens].filter(Boolean);
  return parts.length ? `<div class="card-exif">${parts.join(' — ')}</div>` : '';
}

// オーバーレイ用：詳細
function overlayExifHtml(exif) {
  if (!exif) return '';
  let html = '<div class="overlay-exif">';
  const line1 = [exif.camera, exif.lens].filter(Boolean).join(' — ');
  if (line1) html += `<div class="exif-camera">${line1}</div>`;
  const details = [exif.focal, exif.f, exif.ss, exif.iso].filter(Boolean);
  if (details.length) html += `<div class="exif-detail">${details.join('  ·  ')}</div>`;
  html += '</div>';
  return html;
}

function buildFilterButtons() {
  const userContexts = new Set();
  const aiContexts = new Set();
  photos.forEach(p => {
    p.contexts.forEach(c => {
      if (isAiContext(c)) aiContexts.add(c);
      else userContexts.add(c);
    });
  });

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.dataset.context = 'すべて';
  allBtn.textContent = 'すべて';
  filterBar.appendChild(allBtn);

  userContexts.forEach(ctx => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.context = ctx;
    btn.textContent = ctx;
    filterBar.appendChild(btn);
  });

  if (aiContexts.size > 0) {
    const divider = document.createElement('div');
    divider.className = 'filter-divider';
    filterBar.appendChild(divider);
    const label = document.createElement('span');
    label.className = 'filter-section-label';
    label.textContent = 'from voice';
    filterBar.appendChild(label);
    aiContexts.forEach(ctx => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn ai-context';
      btn.dataset.context = ctx;
      btn.textContent = ctx;
      filterBar.appendChild(btn);
    });
  }

  filterBar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterByContext(btn.dataset.context);
    });
  });
}

function renderCards() {
  grid.innerHTML = '';
  photos.forEach((photo) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = photo.id;
    card.dataset.contexts = JSON.stringify(photo.contexts);

    const contextsHtml = photo.contexts
      .map(c => `<span class="card-context-tag ${isAiContext(c) ? 'ai' : ''}">${c}</span>`)
      .join('');

    const dateHtml = photo.exif && photo.exif.date
      ? `<span class="card-date">${photo.exif.date}</span>` : '';

    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${photo.src}" alt="${photo.id}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-id-row"><span class="card-id">${photo.id}</span>${dateHtml}</div>
        <div class="card-voice">${photo.voice}</div>
        ${cardExifHtml(photo.exif)}
        <div class="card-meta">
          <span class="card-place">${photo.place} — ${photo.season}</span>
          <div class="card-contexts">${contextsHtml}</div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openOverlay(photo));
    grid.appendChild(card);
  });
  visibleCount.textContent = photos.length;
}

function filterByContext(context) {
  const cards = document.querySelectorAll('.card');
  let count = 0;
  cards.forEach(card => {
    const contexts = JSON.parse(card.dataset.contexts);
    const show = context === 'すべて' || contexts.includes(context);
    if (show) { card.classList.remove('hidden'); count++; }
    else { card.classList.add('hidden'); }
  });
  visibleCount.textContent = count;
}

document.querySelectorAll('[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    grid.classList.toggle('list-view', btn.dataset.view === 'list');
  });
});

document.querySelectorAll('[data-theme-switch]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-theme-switch]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    themeWrapper.setAttribute('data-theme', btn.dataset.themeSwitch);
  });
});

function openOverlay(photo) {
  const contextsHtml = photo.contexts
    .map(c => `<span class="card-context-tag ${isAiContext(c) ? 'ai' : ''}">${c}</span>`)
    .join(' ');

  const dateHtml = photo.exif && photo.exif.date
    ? `<span class="overlay-date">${photo.exif.date}</span>` : '';

  overlayContent.innerHTML = `
    <img src="${photo.src}" alt="${photo.id}">
    <div class="overlay-id-row"><span class="overlay-id">${photo.id}</span>${dateHtml}</div>
    <div class="overlay-voice">${photo.voice}</div>
    ${overlayExifHtml(photo.exif)}
    <div class="overlay-meta">
      <span>${photo.place} — ${photo.season}</span>
      ${contextsHtml}
    </div>
  `;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeOverlay() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

overlay.addEventListener('click', (e) => { if (e.target === overlay) closeOverlay(); });
overlayClose.addEventListener('click', closeOverlay);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeOverlay(); });

buildFilterButtons();
renderCards();
</script>
</body>
</html>
